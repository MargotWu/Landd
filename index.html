  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"247e8f7f-ed55-4bb7-926c-3e2a7456a1b4\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"15240802-4bbd-4e86-9abe-9126a04aab2e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"62fc02d4-7ffc-474b-9428-6cd7fc4628c4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  --ink:     #0B1410;\n  --ink2:    #1A2620;\n  --ink3:    #2D3A33;\n  --mid:     #6A7770;\n  --soft:    #9BA59F;\n  --rule:    #DDE3DC;\n  --rule2:   #ECEFE9;\n  --paper:   #F4F2EA;\n  --white:   #FFFFFF;\n  --green-deep:  #0F2A1F;\n  --green:       #16563C;\n  --lime:        #7FD89C;\n  --green-soft:  #DDEFE2;\n  --green-line:  rgba(22,86,60,0.28);\n  --green-tint:  rgba(22,86,60,0.06);\n  --serif: 'Space Grotesk', system-ui, sans-serif;\n  --mono:  'Geist Mono', 'Courier New', monospace;\n  --sans:  'Space Grotesk', system-ui, sans-serif;\n}\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  background: var(--paper); color: var(--ink);\n  font-family: var(--sans); font-size: 16px; line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  position: relative; min-height: 100vh; overflow-x: hidden;\n}\n::selection { background: var(--lime); color: var(--green-deep); }\n\n/* AMBIENT BLOBS */\n.blob { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; filter: blur(90px); }\n.blob-1 { width: 680px; height: 680px; background: radial-gradient(circle, rgba(127,216,156,0.5), transparent 70%); top: -220px; left: -180px; animation: floatA 20s ease-in-out infinite; }\n.blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(22,86,60,0.28), transparent 70%); top: 40%; right: -200px; animation: floatB 26s ease-in-out infinite; }\n.blob-3 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(127,216,156,0.35), transparent 70%); bottom: -180px; left: 30%; animation: floatA 24s ease-in-out infinite reverse; }\n@keyframes floatA { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(70px,90px) scale(1.1); } 66% { transform: translate(130px,40px) scale(0.94); } }\n@keyframes floatB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-90px,-70px) scale(1.12); } }\n\n/* NAV */\nnav {\n  position: sticky; top: 0; z-index: 100;\n  background: rgba(244,242,234,0.55);\n  backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);\n  border-bottom: 1px solid rgba(221,227,220,0.5);\n}\n.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; height: 68px; display: flex; align-items: center; justify-content: space-between; }\n.brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }\n.brand-logo { width: 88px; height: 34px; overflow: visible; animation: catLeap 1.8s ease-in-out infinite; transform-origin: center; }\n.brand:hover .brand-logo { animation-duration: 1.2s; }\n@keyframes catLeap { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.5px); } }\n.brand-word { font-family: var(--mono); font-weight: 500; font-size: 18px; letter-spacing: 0.22em; text-transform: uppercase; }\n.nav-links { display: flex; align-items: center; gap: 30px; }\n.nav-links a { font-family: var(--mono); font-size: 11px; color: var(--mid); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.15s; }\n.nav-links a:hover { color: var(--ink); }\n.nav-cta {\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  padding: 10px 20px; border-radius: 999px; text-decoration: none;\n  background: var(--green-deep); color: var(--paper);\n  border: 1px solid var(--green-deep); transition: all 0.18s cubic-bezier(.16,1,.3,1);\n}\n.nav-cta:hover { background: var(--green); border-color: var(--green); transform: translateY(-1px); box-shadow: 0 8px 22px -8px rgba(15,42,31,0.5); }\n\n/* SHELL */\n.wrap { max-width: 1200px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }\n\n/* HERO */\n.hero { padding: 120px 0 100px; text-align: center; position: relative; z-index: 1; }\n.hero-eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--mono); font-size: 11px; color: var(--green); letter-spacing: 0.14em; text-transform: uppercase;\n  padding: 8px 18px; border-radius: 999px; margin-bottom: 36px;\n  background: rgba(255,255,255,0.5); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);\n  border: 1px solid rgba(255,255,255,0.6);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);\n}\n.hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 8px var(--lime); }\n.hero-cat { width: clamp(160px, 26vw, 280px); height: auto; overflow: visible; margin: 0 auto 8px; display: block; animation: catLeap 1.8s ease-in-out infinite; }\nh1 {\n  font-family: var(--serif); font-weight: 700;\n  font-size: clamp(52px, 8.5vw, 116px); line-height: 0.98; letter-spacing: -0.04em;\n  margin-bottom: 28px;\n}\nh1 .line2 { display: block; color: var(--green-deep); position: relative; width: max-content; max-width: 100%; margin: 0 auto; }\nh1 .line2::after { content: ''; position: absolute; left: -6px; right: -6px; bottom: 0.12em; height: 0.3em; background: var(--lime); opacity: 0.65; z-index: -1; transform: skewX(-6deg); }\n.hero-sub { font-size: clamp(17px, 2vw, 21px); color: var(--ink3); max-width: 560px; margin: 0 auto 44px; font-weight: 300; line-height: 1.6; }\n.hero-sub strong { font-weight: 600; color: var(--ink); }\n.hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }\n.btn {\n  font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;\n  padding: 16px 30px; border-radius: 999px; text-decoration: none; cursor: pointer;\n  display: inline-flex; align-items: center; gap: 9px; transition: all 0.18s cubic-bezier(.16,1,.3,1);\n  border: 1px solid;\n}\n.btn-fill { background: var(--green-deep); color: var(--paper); border-color: var(--green-deep); }\n.btn-fill:hover { background: var(--green); border-color: var(--green); transform: translateY(-2px); box-shadow: 0 14px 32px -10px rgba(15,42,31,0.55); }\n.btn-glass {\n  background: rgba(255,255,255,0.5); color: var(--ink3);\n  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);\n  border-color: rgba(255,255,255,0.7); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);\n}\n.btn-glass:hover { background: rgba(255,255,255,0.8); color: var(--ink); transform: translateY(-2px); }\n\n/* SCROLL CUE */\n.scroll-cue { margin-top: 64px; display: flex; flex-direction: column; align-items: center; gap: 10px; font-family: var(--mono); font-size: 10px; color: var(--soft); letter-spacing: 0.12em; text-transform: uppercase; }\n.scroll-cue .dot { width: 22px; height: 36px; border: 1.5px solid var(--soft); border-radius: 999px; position: relative; }\n.scroll-cue .dot::after { content: ''; position: absolute; top: 7px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--green); animation: en-deep)\" stroke=\"none\"><\u002Fcircle>\n            <path d=\"M52 23.4 Q 58 25.5 64 27.5\"><\u002Fpath>\n            <path d=\"M50.5 24.4 Q 57 27.5 63 30.5\"><\u002Fpath>\n            <path d=\"M23 28.5 Q 19 31.5 14 34.5\"><\u002Fpath>\n            <path d=\"M28 29 Q 24 32.5 19 36.5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"founder-meta\">\n          <div class=\"founder-name\">From the founder<\u002Fdiv>\n          <div class=\"founder-role\">An expat &amp; one well-travelled cat<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"founder-text\">\n      <h2>I moved to the Netherlands to study and work — with a <em>cat<\u002Fem> in tow.<\u002Fh2>\n      <p>I came here as an international, chasing a degree and then a career. My adopted cat came with me — through every apartment, sublet, and short-term room we ended up in.<\u002Fp>\n      <p>And there were a lot of them. I moved again and again, each time fighting the same maze: listings scattered across six sites, fine print in Dutch, \"no registration\" surprises, and landlords who quietly wouldn't take pets. Finding a place that worked for <strong>both of us<\u002Fstrong> felt almost impossible.<\u002Fp>\n      <p>Somewhere along the way it hit me — if it's this hard for me, it's this hard for every newcomer arriving with their own life, their own constraints, their own little companion. So I built the tool I wish I'd had.<\u002Fp>\n      <p class=\"founder-sign\">That tool is <strong>Landd<\u002Fstrong> — so the next person, and the next cat, lands somewhere that finally feels like home.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PILLARS / WHY -->\n<section class=\"story\" id=\"why\">\n  <div class=\"wrap\">\n    <div class=\"pillars-head reveal\">\n      <div class=\"sec-tag\" style=\"justify-content:center;\">Why Landd<\u002Fdiv>\n      <h2>Clarity, not chaos.<\u002Fh2>\n      <p>Three things we promise every newcomer.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillars\">\n      <div class=\"pillar reveal\">\n        <div class=\"pillar-ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12h4l3 8 4-16 3 8h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>One feed, six platforms<\u002Fh3>\n        <p>We pull listings from across the Dutch market into a single, de-duplicated stream — so you stop refreshing six tabs a day.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar reveal\">\n        <div class=\"pillar-ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3.5-3.5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>The hidden stuff, surfaced<\u002Fh3>\n        <p>Registration policy, all-in vs. kale huur, who the landlord actually rents to — read straight from the listing, before you waste an email.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar reveal\">\n        <div class=\"pillar-ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l2.4 6.9L21 12l-6.6 2.1L12 21l-2.4-6.9L3 12l6.6-2.1z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Ranked for you<\u002Fh3>\n        <p>Every home gets a match score against your budget, area, and must-haves — so the right place rises to the top instead of getting buried.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- JOURNEY -->\n<section class=\"story\" id=\"journey\">\n  <div class=\"wrap\">\n    <div class=\"journey-head reveal\">\n      <div class=\"sec-tag\" style=\"justify-content:center;\">The Journey<\u002Fdiv>\n      <h2>From lost to landed.<\u002Fh2>\n      <p>Four steps between you and your front door.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step reveal\">\n        <div class=\"step-n\">01<\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>Tell us about you<\u002Fh3>\n          <p>Student or working, your budget, your areas, and the dealbreakers — registration, transit, all-in pricing. One quick setup.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-n\">02<\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>We gather the market<\u002Fh3>\n          <p>Listings from six platforms, refreshed continuously, translated from Dutch, and cleaned of duplicates.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-n\">03<\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>See your matches, ranked<\u002Fh3>\n          <p>Each home scored against your needs, on a clean map and list — with the reasons laid out, so you trust the order.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"step-n\">04<\u002Fdiv>\n        <div class=\"step-body\">\n          <h3>Land your home<\u002Fh3>\n          <p>Open the best fits, reach out with confidence, and stop second-guessing. You're home.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STATS -->\n<section class=\"story\">\n  <div class=\"wrap stats reveal\">\n    <div class=\"stat\"><div class=\"stat-n\">6<\u002Fdiv><div class=\"stat-l\">Platforms in one feed<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"stat-n\">7<\u002Fdiv><div class=\"stat-l\">Data points per home<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"stat-n\">30<span class=\"u\">min<\u002Fspan><\u002Fdiv><div class=\"stat-l\">Ref
